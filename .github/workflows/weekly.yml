name: Weekly retrain + push to Cloudflare

on:
  # Thursday 09:00 UTC — gives headroom before typical Friday/Saturday deadlines
  schedule:
    - cron: "0 9 * * 4"
  workflow_dispatch:
    inputs:
      target_gw:
        description: "Gameweek to generate recommendations for"
        required: true
        default: "35"

env:
  PYTHONPATH: backend

jobs:
  retrain-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Seed DB (deterministic offline data)
        # Use the deterministic seed as the only data source for now. Live
        # ingest is disabled here because it writes to the same 9999xxxx
        # id namespace as the seed and overwrites seeded player positions
        # and team references, corrupting the feature matrix. Re-enable
        # once live ingest uses a separate namespace or skips existing ids.
        working-directory: backend
        run: |
          python -c "
          from app.db.init_db import init_db
          from app.db.session import SessionLocal
          from app.db.models import PlayerGWStats
          from app.ingest.seed_offline import seed

          init_db()
          print('[seed] result:', seed())
          with SessionLocal() as db:
              rows = db.query(PlayerGWStats).count()
          print(f'[seed] player_gw_stats rows: {rows}')
          assert rows > 0, 'offline seed produced no rows'
          "

      - name: Train per-position models
        working-directory: backend
        run: python -m app.ml.train

      - name: Generate recommendations for upcoming GW
        working-directory: backend
        env:
          TARGET_GW: ${{ github.event.inputs.target_gw || '35' }}
        run: |
          python -c "
          import os
          from app.db.session import SessionLocal
          from app.services.recommendations import generate_recommendations, accuracy_for_gw
          gw = int(os.environ['TARGET_GW'])
          with SessionLocal() as db:
              print('GEN:', generate_recommendations(db, gw=gw, season='live'))
              # Record accuracy for the GW before the target, if actuals exist.
              print('ACC:', accuracy_for_gw(db, gw=gw - 1, season='live'))
          "

      - name: Export DB to edge/data.sql
        working-directory: backend
        run: python -m app.export.to_d1

      - name: Inspect exported data.sql
        run: |
          echo "---- size ----"
          wc -l edge/data.sql
          du -h edge/data.sql
          echo "---- first 5 lines ----"
          head -5 edge/data.sql
          echo "---- any transaction statements? (should be empty) ----"
          grep -niE '^\s*(BEGIN|COMMIT|SAVEPOINT|ROLLBACK|RELEASE)\b' edge/data.sql || echo "  none found"

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Push schema + data to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler --config edge/wrangler.toml \
            d1 execute fpl-oracle --remote --file=edge/schema.sql --yes
          wrangler --config edge/wrangler.toml \
            d1 execute fpl-oracle --remote --file=edge/data.sql --yes

      - name: Deploy Worker
        working-directory: edge/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npx wrangler@4 deploy --config ../wrangler.toml

      - name: Build and deploy Pages
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm ci
          npm run build
          npx wrangler@4 pages deploy dist --project-name=fpl-oracle --branch=main
