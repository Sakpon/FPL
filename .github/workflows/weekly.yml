name: Weekly retrain + push to Cloudflare

on:
  # Daily at 09:00 UTC. The `decide` job below queries the live FPL API and
  # only proceeds when the next GW deadline is 12–36h away, so the heavy
  # pipeline runs exactly once per GW regardless of weekday.
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      target_gw:
        description: "Gameweek to generate recommendations for (leave blank to auto-detect)"
        required: false
        default: ""

env:
  PYTHONPATH: backend

jobs:
  decide:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.gate.outputs.run }}
      target_gw: ${{ steps.gate.outputs.target_gw }}
    steps:
      - name: Resolve next GW + decide whether to run
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_GW: ${{ github.event.inputs.target_gw }}
        run: |
          set -euo pipefail
          # Default fallback if API or parsing fails — the main job has its
          # own seed fallback so missing a precise target won't break a deploy.
          FALLBACK_GW=35

          payload=$(curl -fsS https://fantasy.premierleague.com/api/bootstrap-static/ || echo "")

          parse=$(printf '%s' "$payload" | python3 - <<'PY' || true
          import json, sys
          try:
              data = json.load(sys.stdin)
          except Exception:
              sys.exit(0)
          for e in data.get("events", []):
              if e.get("is_next"):
                  print(f'{e["id"]}|{e.get("deadline_time","")}')
                  break
          PY
          )

          api_gw=""
          api_iso=""
          if [ -n "$parse" ]; then
            api_gw="${parse%%|*}"
            api_iso="${parse##*|}"
            echo "FPL is_next: GW${api_gw} deadline=${api_iso}"
          else
            echo "Could not parse FPL bootstrap (api unreachable or no is_next)"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual run always proceeds; honour input override, else use API,
            # else fallback constant.
            target="${INPUT_GW:-}"
            if [ -z "$target" ]; then target="${api_gw:-$FALLBACK_GW}"; fi
            echo "Manual dispatch → run=true target_gw=${target}"
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "target_gw=${target}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Scheduled run: only fire inside a 12–36h pre-deadline window.
          if [ -z "$api_iso" ] || [ -z "$api_gw" ]; then
            echo "No deadline info; skipping scheduled run"
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "target_gw=${FALLBACK_GW}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          target_ts=$(date -u -d "$api_iso" +%s)
          now_ts=$(date -u +%s)
          hours=$(( (target_ts - now_ts) / 3600 ))
          echo "Hours until deadline: ${hours}"

          if [ "$hours" -ge 12 ] && [ "$hours" -lt 36 ]; then
            echo "Inside 12–36h window → run=true"
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "target_gw=${api_gw}" >> "$GITHUB_OUTPUT"
          else
            echo "Outside window → skip"
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "target_gw=${api_gw}" >> "$GITHUB_OUTPUT"
          fi

  retrain-and-push:
    needs: decide
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Seed DB (deterministic offline data)
        # Historical seasons (2023-24, 2024-25) stay synthetic — they're just
        # training-feature padding. The live season is refreshed from the
        # real FPL API in the next step so the portal serves the current
        # roster rather than a stale hardcoded pool.
        working-directory: backend
        run: |
          python -c "
          from app.db.init_db import init_db
          from app.db.session import SessionLocal
          from app.db.models import PlayerGWStats
          from app.ingest.seed_offline import seed

          init_db()
          print('[seed] result:', seed())
          with SessionLocal() as db:
              rows = db.query(PlayerGWStats).count()
          print(f'[seed] player_gw_stats rows: {rows}')
          assert rows > 0, 'offline seed produced no rows'
          "

      - name: Refresh live season from FPL API
        # Drop seed-created live-season rows (9999xxxx namespace) and repopulate
        # from the real FPL API so the portal shows the current roster. Any
        # failure falls back silently to the seeded synthetic live data — the
        # pipeline still produces a deployable build.
        working-directory: backend
        run: |
          python -c "
          import asyncio
          import traceback
          from sqlalchemy import and_

          from app.db.session import SessionLocal
          from app.db.models import (
              ActualResult, Fixture, Gameweek, GuruMention, GuruSource,
              Player, PlayerGWStats, Team,
          )
          from app.ingest import ingest_live as live
          from app.ingest.seed_offline import seed as reseed
          from app.ingest import fpl_api

          LIVE_PID_LO, LIVE_PID_HI = 9999_0000, 9999_9999
          LIVE_TID_LO, LIVE_TID_HI = 999901, 999999
          LIVE_FID_LO, LIVE_FID_HI = 9999_00000, 9999_99999

          # Fail-safe probe: if the FPL API is unreachable, leave the seed
          # alone — a stale-but-working dashboard beats an empty one.
          try:
              probe = asyncio.run(fpl_api.fetch_bootstrap())
              assert probe.get('teams') and probe.get('elements'), 'empty bootstrap'
          except Exception:
              print('[live] FPL API unreachable — keeping seeded live data')
              traceback.print_exc()
              import sys
              sys.exit(0)

          try:
              # 1. Wipe seeded live rows so the FPL API becomes the source of
              # truth for this season (identity, positions, prices, stats).
              with SessionLocal() as db:
                  db.query(GuruMention).filter(
                      GuruMention.player_id.between(LIVE_PID_LO, LIVE_PID_HI)
                  ).delete(synchronize_session=False)
                  db.query(ActualResult).filter(
                      ActualResult.player_id.between(LIVE_PID_LO, LIVE_PID_HI)
                  ).delete(synchronize_session=False)
                  db.query(PlayerGWStats).filter(
                      and_(
                          PlayerGWStats.season == 'live',
                          PlayerGWStats.player_id.between(LIVE_PID_LO, LIVE_PID_HI),
                      )
                  ).delete(synchronize_session=False)
                  db.query(Fixture).filter(
                      Fixture.id.between(LIVE_FID_LO, LIVE_FID_HI)
                  ).delete(synchronize_session=False)
                  db.query(Player).filter(
                      Player.id.between(LIVE_PID_LO, LIVE_PID_HI)
                  ).delete(synchronize_session=False)
                  db.query(Gameweek).filter(Gameweek.season == 'live').delete(
                      synchronize_session=False
                  )
                  db.query(Team).filter(
                      Team.id.between(LIVE_TID_LO, LIVE_TID_HI)
                  ).delete(synchronize_session=False)
                  db.commit()

              # 2. Bootstrap — real teams, players, gameweeks
              print('[live] bootstrap:', asyncio.run(live.sync_bootstrap()))
              print('[live] fixtures:', asyncio.run(live.sync_fixtures()))

              # 3. Pull finished-GW stats so training has real features
              with SessionLocal() as db:
                  finished = [
                      g.id for g in db.query(Gameweek)
                      .filter(Gameweek.finished == True, Gameweek.season == 'live')
                      .order_by(Gameweek.id).all()
                  ]
              print(f'[live] finished GWs: {finished}')
              for gw in finished:
                  n = asyncio.run(live.sync_live_points(gw))
                  print(f'[live] GW{gw} → {n} rows')

              # 4. Re-seed guru mentions against real top players so the
              # dashboard Buzz panel is not empty. Deterministic shuffle.
              import random
              rng = random.Random(42)
              with SessionLocal() as db:
                  if db.query(GuruSource).count() == 0:
                      print('[live] no guru sources (seed did not run?)')
                  else:
                      sources = db.query(GuruSource).all()
                      top_players = (
                          db.query(Player)
                          .filter(Player.id.between(LIVE_PID_LO, LIVE_PID_HI))
                          .order_by(Player.total_points.desc())
                          .limit(80)
                          .all()
                      )
                      next_gw = db.query(Gameweek).filter_by(
                          is_next=True, season='live'
                      ).first()
                      target_gw = next_gw.id if next_gw else 35
                      for src in sources:
                          rng.shuffle(top_players)
                          picks = top_players[: rng.randint(4, 7)]
                          for i, p in enumerate(picks):
                              db.add(GuruMention(
                                  source_id=src.id, player_id=p.id, gw=target_gw,
                                  sentiment=round(rng.uniform(0.2, 1.0), 2),
                                  is_captain_pick=(i == 0 and rng.random() < 0.5),
                                  is_differential=(
                                      p.selected_by_percent < 8
                                      and rng.random() < 0.4
                                  ),
                                  is_avoid=False,
                                  snippet=(
                                      f'{src.name} highlighted {p.web_name} '
                                      f'for GW{target_gw}'
                                  ),
                              ))
                      db.commit()
                      print(f'[live] re-seeded guru mentions for GW{target_gw}')

              with SessionLocal() as db:
                  p = db.query(Player).filter(
                      Player.id.between(LIVE_PID_LO, LIVE_PID_HI)
                  ).count()
                  s = db.query(PlayerGWStats).filter(
                      PlayerGWStats.season == 'live'
                  ).count()
                  a = db.query(ActualResult).filter(
                      ActualResult.season == 'live'
                  ).count()
                  print(f'[live] final counts — players={p} stats={s} actuals={a}')
          except Exception:
              print('[live] refresh failed after wipe — re-seeding live data')
              traceback.print_exc()
              # Wipe again and re-seed everything so we don't train on a
              # half-populated live season.
              with SessionLocal() as db:
                  for model in (
                      GuruMention, ActualResult, PlayerGWStats, Fixture,
                      Player, Gameweek, Team, GuruSource,
                  ):
                      db.query(model).delete(synchronize_session=False)
                  db.commit()
              print('[live] reseed:', reseed())
          "

      - name: Train per-position models
        working-directory: backend
        run: python -m app.ml.train

      - name: Generate recommendations for upcoming GW
        working-directory: backend
        env:
          TARGET_GW: ${{ needs.decide.outputs.target_gw }}
        run: |
          python -c "
          import os
          from app.db.session import SessionLocal
          from app.services.recommendations import generate_recommendations, accuracy_for_gw
          target = int(os.environ['TARGET_GW'])
          with SessionLocal() as db:
              # Backfill: generate recs for every finished GW so we have
              # something to compare to actuals (populates accuracy_log and
              # History chart). Seed marks GWs 1..target-1 as finished.
              for gw in range(1, target):
                  r = generate_recommendations(db, gw=gw, season='live')
                  a = accuracy_for_gw(db, gw=gw, season='live')
                  print(f'[backfill] gw={gw} gen={r.get(\"status\")} '
                        f'acc.mae={a.get(\"mae\")} n={a.get(\"n\")}')
              # The live/upcoming GW we actually deploy picks for.
              print('GEN:', generate_recommendations(db, gw=target, season='live'))
              print('ACC:', accuracy_for_gw(db, gw=target - 1, season='live'))
          "

      - name: Export DB to edge/data.sql
        working-directory: backend
        run: python -m app.export.to_d1

      - name: Inspect exported data.sql
        run: |
          echo "---- size ----"
          wc -l edge/data.sql
          du -h edge/data.sql
          echo "---- first 5 lines ----"
          head -5 edge/data.sql
          echo "---- any transaction statements? (should be empty) ----"
          grep -niE '^\s*(BEGIN|COMMIT|SAVEPOINT|ROLLBACK|RELEASE)\b' edge/data.sql || echo "  none found"

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Push schema + data to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler --config edge/wrangler.toml \
            d1 execute fpl-oracle --remote --file=edge/schema.sql --yes
          wrangler --config edge/wrangler.toml \
            d1 execute fpl-oracle --remote --file=edge/data.sql --yes

      - name: Deploy Worker
        working-directory: edge/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npx wrangler@4 deploy --config ../wrangler.toml

      - name: Build and deploy Pages
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm ci
          npm run build
          # If VITE_API_BASE points at the Worker, also emit a _redirects
          # proxy so requests to /api/* on the Pages domain are forwarded to
          # the Worker. The frontend code uses VITE_API_BASE directly; this
          # is belt-and-suspenders for same-domain callers.
          if [ -n "$VITE_API_BASE" ]; then
            # Prepend /api rule so it matches before the SPA fallback.
            { echo "/api/*  ${VITE_API_BASE%/}/:splat  200"; cat dist/_redirects; } \
              > dist/_redirects.new
            mv dist/_redirects.new dist/_redirects
            echo "---- dist/_redirects ----"
            cat dist/_redirects
          fi
          # Create the Pages project on first run. Swallow "already exists" on
          # subsequent runs so this step stays idempotent.
          npx wrangler@4 pages project create fpl-oracle \
            --production-branch=main 2>&1 | tee /tmp/pages-create.log || \
            grep -qi 'already exists' /tmp/pages-create.log
          npx wrangler@4 pages deploy dist \
            --project-name=fpl-oracle --branch=main --commit-dirty=true
